<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Replay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1e1e1e;
    --bg-light: #252526;
    --bg-user: #1a2733;
    --text: #d4d4d4;
    --text-dim: #808080;
    --text-muted: #5a5a5a;
    --white: #ffffff;
    --blue: #569cd6;
    --orange: #ce9178;
    --green: #6a9955;
    --red: #f44747;
    --yellow: #dcdcaa;
    --cyan: #4ec9b0;
    --purple: #c586c0;
    --amber: #e8a838;
    --border: #333333;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Menlo', 'SF Mono', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Upload screen */
  #upload-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  #upload-screen h1 { font-size: 20px; color: var(--white); font-weight: 600; }
  #upload-screen p { color: var(--text-dim); font-size: 13px; }

  #drop-zone {
    width: 460px;
    max-width: 90vw;
    height: 180px;
    border: 2px dashed var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--blue);
    background: rgba(86, 156, 214, 0.05);
  }

  #drop-zone .icon { font-size: 36px; opacity: 0.4; }
  #drop-zone .label { color: var(--text-dim); font-size: 13px; }
  #drop-zone .sublabel { color: var(--text-muted); font-size: 11px; }
  #file-input { display: none; }

  /* Replay screen */
  #replay-screen { display: none; flex: 1; flex-direction: column; height: 100vh; }

  /* Controls bar */
  #controls {
    background: var(--bg-light);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .ctrl-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all 0.15s;
  }

  .ctrl-btn:hover { background: var(--border); }
  .ctrl-btn.active { background: var(--blue); border-color: var(--blue); color: var(--white); }

  #speed-display { color: var(--text-dim); font-size: 12px; min-width: 36px; text-align: center; }

  #progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
  }

  #progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s;
  }

  .ctrl-sep { width: 1px; height: 20px; background: var(--border); }

  #msg-counter { color: var(--text-muted); font-size: 11px; }

  #new-file-btn {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-family: inherit; font-size: 11px;
    padding: 4px 8px; border-radius: 4px;
  }
  #new-file-btn:hover { color: var(--text); background: var(--border); }

  /* === 3-ROW LAYOUT === */

  /* Main area fills space between controls and status bar */
  #main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Row 1: Stream — scrollable history, content hugs bottom */
  #stream {
    flex: 1;
    overflow-y: auto;
  }

  #stream-inner {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 16px 20px;
  }

  #stream::-webkit-scrollbar { width: 8px; }
  #stream::-webkit-scrollbar-track { background: var(--bg); }
  #stream::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Row 2: Workspace — Claude's active state (sticky) */
  #workspace {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    max-height: 40vh;
    overflow-y: auto;
    display: none;
  }

  #workspace.visible { display: block; }

  #activity {
    padding: 6px 20px;
    color: var(--text-dim);
    font-size: 12px;
    display: none;
    align-items: center;
    gap: 6px;
  }

  #activity.visible { display: flex; }

  .activity-spinner {
    color: var(--amber);
    font-size: 13px;
  }

  .activity-text {
    color: var(--text-dim);
  }

  /* Task panel — inside workspace */
  #task-panel {
    display: none;
    padding: 6px 20px 10px;
    font-size: 13px;
  }

  #task-panel.visible { display: block; }

  .task-list-header {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 2px 0;
  }

  .task-list-header .task-header-icon { color: var(--amber); }
  .task-list-header .task-header-text { color: var(--amber); font-weight: 700; }

  .task-list-items {
    margin-left: 14px;
    border-left: 1px solid var(--border);
    padding-left: 10px;
  }

  .task-item {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 1px 0;
  }

  .task-item .task-check { font-size: 12px; width: 14px; flex-shrink: 0; }
  .task-item.pending .task-check { color: var(--white); }
  .task-item.in-progress .task-check { color: var(--amber); }
  .task-item.completed .task-check { color: var(--green); }
  .task-item.completed .task-subject { color: var(--text-muted); text-decoration: line-through; }
  .task-item.pending .task-subject { color: var(--white); }
  .task-item.in-progress .task-subject { color: var(--text); }

  .task-overflow { color: var(--text-muted); font-size: 12px; padding: 2px 0; }

  /* Row 3: User input — prompt area (sticky) */
  #user-input {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 10px 20px;
    min-height: 40px;
  }

  #user-input .input-prompt {
    color: var(--blue);
    font-weight: 700;
    margin-right: 8px;
  }

  #input-text {
    color: var(--white);
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* === MESSAGE STYLES === */

  /* User message in stream — blue-tinted block with ❯ prompt */
  .msg-user {
    background: var(--bg-user);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 12px 0;
  }

  .msg-user .user-prompt {
    color: var(--blue);
    margin-right: 8px;
    font-weight: 700;
  }

  .msg-user .user-text {
    color: var(--white);
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* Assistant content */
  .assistant-block { margin: 4px 0; }

  /* Bullet text — ● prefix */
  .bullet-text {
    padding: 4px 0;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .bullet-text .bullet { color: var(--text-dim); margin-right: 6px; }

  /* Markdown in assistant text */
  .bullet-text strong { color: var(--white); font-weight: 700; }
  .bullet-text em { color: var(--text-dim); font-style: italic; }

  .bullet-text code {
    background: rgba(255,255,255,0.08);
    color: var(--cyan);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
  }

  .bullet-text pre {
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    margin: 6px 0;
    overflow-x: auto;
  }

  .bullet-text pre code { background: none; padding: 0; color: var(--text); }

  .bullet-text h1, .bullet-text h2, .bullet-text h3 {
    color: var(--white);
    margin: 12px 0 6px 0;
    font-weight: 600;
  }
  .bullet-text h1 { font-size: 16px; }
  .bullet-text h2 { font-size: 14px; }
  .bullet-text h3 { font-size: 13px; }

  .bullet-text ul, .bullet-text ol { margin: 4px 0; padding-left: 20px; }
  .bullet-text li { margin: 2px 0; }

  .bullet-text blockquote {
    border-left: 2px solid var(--blue);
    padding-left: 10px;
    color: var(--text-dim);
    margin: 6px 0;
  }

  .bullet-text a { color: var(--blue); text-decoration: none; }

  .bullet-text table { border-collapse: collapse; margin: 6px 0; }
  .bullet-text th, .bullet-text td {
    border: 1px solid var(--border);
    padding: 4px 10px;
    text-align: left;
  }
  .bullet-text th { background: var(--bg-light); font-weight: 600; }

  /* Tool call — ● ToolName(summary) */
  .tool-call { margin: 6px 0 2px 0; }

  .tool-call-header {
    display: flex;
    align-items: baseline;
    gap: 0;
    cursor: pointer;
    user-select: none;
    padding: 2px 0;
  }

  .tool-call-header:hover { opacity: 0.85; }
  .tool-call-header .bullet { color: var(--text-dim); margin-right: 6px; }
  .tool-call-name { color: var(--amber); font-weight: 700; }
  .tool-call-paren { color: var(--text-dim); }
  .tool-call-summary { color: var(--text); }

  .tool-call-body {
    display: none;
    margin-left: 20px;
    padding: 4px 0;
    color: var(--text-dim);
    font-size: 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .tool-call.open .tool-call-body { display: block; }

  .tool-call-expand {
    margin-left: 20px;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
  }

  .tool-call.open .tool-call-expand { display: none; }

  /* Tool result — └ connector */
  .tool-result { margin: 0 0 4px 0; }

  .tool-result-line {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 1px 0;
    cursor: pointer;
    user-select: none;
  }

  .tool-result-line:hover { opacity: 0.85; }

  .tool-result-connector { color: var(--text-muted); margin-right: 6px; font-size: 12px; }

  .tool-result-preview {
    color: var(--text-dim);
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 80%;
  }

  .tool-result-body {
    display: none;
    margin-left: 20px;
    padding: 4px 0;
    color: var(--text-dim);
    font-size: 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 300px;
    overflow-y: auto;
  }

  .tool-result.open .tool-result-body { display: block; }

  .tool-result-expand {
    margin-left: 20px;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
  }

  .tool-result.open .tool-result-expand { display: none; }
  .tool-result.error .tool-result-preview { color: var(--red); }

  /* Status line — ✱ Worked for Xm Xs */
  .status-line {
    color: var(--text-muted);
    font-size: 12px;
    margin: 8px 0;
    padding: 2px 0;
  }

  .status-line .status-icon { color: var(--amber); margin-right: 4px; }

  /* Typing cursor */
  .typing-cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--text);
    animation: blink 0.6s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 1px;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Status bar at bottom */
  #status-bar {
    background: var(--bg-light);
    border-top: 1px solid var(--border);
    padding: 3px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .status-item { display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.active { background: var(--green); }
  .status-dot.paused { background: var(--amber); }
  .status-dot.idle { background: var(--text-muted); }
</style>
</head>
<body>

<!-- Upload Screen -->
<div id="upload-screen">
  <h1>Claude Code Replay</h1>
  <p>Upload a Claude Code conversation (.jsonl) to replay it</p>
  <div id="drop-zone">
    <div class="icon">&#128196;</div>
    <div class="label">Drop .jsonl file here</div>
    <div class="sublabel">or click to browse</div>
  </div>
  <input type="file" id="file-input" accept=".jsonl">
</div>

<!-- Replay Screen -->
<div id="replay-screen">
  <div id="controls">
    <button class="ctrl-btn" id="btn-play" title="Play/Pause (Space)">&#9654; Play</button>
    <button class="ctrl-btn" id="btn-step" title="Step (Right Arrow)">Step</button>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn" id="btn-slower">&#8722;</button>
    <div id="speed-display">1x</div>
    <button class="ctrl-btn" id="btn-faster">+</button>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn" id="btn-realtime" title="Real-time mode (T) — use actual timestamps">Real-time</button>
    <div class="ctrl-sep"></div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="msg-counter"></div>
    <div class="ctrl-sep"></div>
    <button id="new-file-btn">New file</button>
  </div>

  <div id="main-area">
    <!-- Row 1: Stream — scrollable history -->
    <div id="stream"><div id="stream-inner"></div></div>

    <!-- Row 2: Workspace — Claude's active state (sticky) -->
    <div id="workspace">
      <div id="activity"></div>
      <div id="task-panel"></div>
    </div>

    <!-- Row 3: User input (sticky) -->
    <div id="user-input">
      <span class="input-prompt">&#10095;</span><span id="input-text"></span>
    </div>
  </div>

  <div id="status-bar">
    <div class="status-item">
      <div class="status-dot idle" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
    <div class="status-item" id="status-model"></div>
    <div style="flex:1"></div>
    <div class="status-item" id="status-branch"></div>
  </div>
</div>

<script>
// --- State ---
let messages = [];
let currentIndex = 0;
let playing = false;
let speed = 1;
const speeds = [0.25, 0.5, 1, 2, 4, 8, 16];
let speedIdx = 2;
let realTimeMode = false;
let spinnerInterval = null;

// --- DOM refs ---
const stream = document.getElementById('stream');
const streamInner = document.getElementById('stream-inner');
const workspace = document.getElementById('workspace');
const activityEl = document.getElementById('activity');
const taskPanel = document.getElementById('task-panel');
const inputText = document.getElementById('input-text');
const progressFill = document.getElementById('progress-fill');
const msgCounter = document.getElementById('msg-counter');
const statusDot = document.getElementById('status-dot');
const statusTextEl = document.getElementById('status-text');

// --- Credential redaction ---
function redact(text) {
  if (!text) return text;
  text = text.replace(/sk-ant-[a-zA-Z0-9_-]{10,}/g, 'sk-ant-****[REDACTED]');
  text = text.replace(/sk-[a-zA-Z0-9]{20,}/g, 'sk-****[REDACTED]');
  text = text.replace(/AAAA[A-Za-z0-9+\/]{20,}/g, 'AAAA...[REDACTED]');
  return text;
}

// --- Simple markdown to HTML ---
function md(text) {
  if (!text) return '';
  text = redact(text);

  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${escHtml(code.trim())}</code></pre>`;
  });

  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic
  text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');

  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Blockquotes
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists
  text = text.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');

  // Tables
  text = text.replace(/^\|(.+)\|$/gm, (match, inner) => {
    const cells = inner.split('|').map(c => c.trim());
    if (cells.every(c => /^[\-:]+$/.test(c))) return '';
    return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
  });
  if (text.includes('<tr>')) {
    text = text.replace(/((?:<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>');
  }

  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Line breaks
  text = text.replace(/\n{2,}/g, '</p><p>');
  text = text.replace(/\n/g, '<br>');
  if (!text.startsWith('<')) text = '<p>' + text + '</p>';
  text = text.replace(/<p>\s*<\/p>/g, '');

  return text;
}

function escHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// --- JSONL Parser ---
function parseJSONL(text) {
  const lines = text.trim().split('\n');
  const parsed = [];
  let sessionInfo = {};

  for (const line of lines) {
    try {
      const obj = JSON.parse(line);
      parsed.push(obj);
      if (!sessionInfo.sessionId && obj.sessionId) {
        sessionInfo = {
          sessionId: obj.sessionId,
          version: obj.version,
          gitBranch: obj.gitBranch,
          cwd: obj.cwd
        };
      }
    } catch (e) {}
  }

  const conversation = [];
  const toolResultMap = new Map();

  // First pass: collect tool results
  for (const entry of parsed) {
    if (entry.type === 'user' && entry.message) {
      const content = entry.message.content;
      if (Array.isArray(content)) {
        for (const block of content) {
          if (block.type === 'tool_result') {
            toolResultMap.set(block.tool_use_id, {
              content: block.content,
              is_error: block.is_error || false,
              stdout: entry.toolUseResult?.stdout,
              stderr: entry.toolUseResult?.stderr
            });
          }
        }
      }
    }
  }

  // Second pass: build conversation
  const assistantGroups = new Map();

  for (const entry of parsed) {
    if (entry.type === 'user' && entry.message) {
      const content = entry.message.content;
      if (typeof content === 'string' && content.trim()) {
        conversation.push({
          type: 'user',
          text: content,
          timestamp: entry.timestamp,
          uuid: entry.uuid
        });
      }
    } else if (entry.type === 'assistant' && entry.message) {
      const reqId = entry.requestId || entry.uuid;
      if (!assistantGroups.has(reqId)) {
        assistantGroups.set(reqId, {
          type: 'assistant',
          content: [],
          model: entry.message.model,
          timestamp: entry.timestamp,
          uuid: entry.uuid
        });
      }
      const group = assistantGroups.get(reqId);
      const msgContent = entry.message.content;
      if (Array.isArray(msgContent)) {
        for (const block of msgContent) {
          if (block.type === 'text' && block.text) {
            const existingIdx = group.content.findIndex(
              c => c.type === 'text' && block.text.startsWith(c.text)
            );
            if (existingIdx >= 0) {
              group.content[existingIdx] = block;
            } else {
              const isDup = group.content.some(c => c.type === 'text' && c.text === block.text);
              if (!isDup) group.content.push(block);
            }
          } else if (block.type === 'tool_use') {
            const isDup = group.content.some(c => c.type === 'tool_use' && c.id === block.id);
            if (!isDup) {
              const result = toolResultMap.get(block.id);
              group.content.push({ ...block, result: result || null });
            }
          }
        }
      }
    }
  }

  const assistantMsgs = Array.from(assistantGroups.values()).filter(m => m.content.length > 0);
  const allMsgs = [...conversation, ...assistantMsgs]
    .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

  return { messages: allMsgs, sessionInfo };
}

// --- Tool summary ---
function getToolSummary(tool) {
  const input = tool.input || {};
  switch (tool.name) {
    case 'Bash': return input.description || input.command?.substring(0, 80) || '';
    case 'Read': return input.file_path || '';
    case 'Write': return input.file_path || '';
    case 'Edit': return input.file_path || '';
    case 'Grep': return `"${input.pattern || ''}" ${input.path || ''}`.trim();
    case 'Glob': return input.pattern || '';
    case 'WebSearch': return input.query || '';
    case 'WebFetch': return input.url?.substring(0, 60) || '';
    case 'TaskCreate': return input.subject?.substring(0, 60) || '';
    case 'TaskUpdate': return `#${input.taskId} ${input.status || ''}`;
    default: return '';
  }
}

function getToolCommand(tool) {
  const input = tool.input || {};
  if (tool.name === 'Bash' && input.command) return input.command;
  if (tool.name === 'Read') return input.file_path || '';
  if (tool.name === 'Write') return input.file_path || '';
  if (tool.name === 'Edit') return `${input.file_path || ''}\n${input.old_string ? 'old: ' + input.old_string.substring(0, 100) : ''}`;
  return JSON.stringify(input, null, 2);
}

// --- Task tracking ---
const taskState = new Map();
let taskCounter = 0;

function isTaskTool(name) {
  return ['TaskCreate', 'TaskUpdate', 'TaskList', 'TaskGet'].includes(name);
}

function handleTaskTool(block) {
  const input = block.input || {};

  if (block.name === 'TaskCreate') {
    taskCounter++;
    const id = String(taskCounter);
    taskState.set(id, {
      subject: input.subject || 'Untitled',
      status: 'pending',
      activeForm: input.activeForm || ''
    });
  } else if (block.name === 'TaskUpdate') {
    const id = input.taskId;
    if (taskState.has(id)) {
      const task = taskState.get(id);
      if (input.status === 'deleted') {
        taskState.delete(id);
      } else {
        if (input.status) task.status = input.status;
        if (input.subject) task.subject = input.subject;
      }
    }
  }

  renderTaskList();
}

function renderTaskList() {
  if (taskState.size === 0) {
    taskPanel.classList.remove('visible');
    updateWorkspaceVisibility();
    return;
  }

  const tasks = Array.from(taskState.values());
  const pending = tasks.filter(t => t.status === 'pending' || t.status === 'in_progress');
  const completed = tasks.filter(t => t.status === 'completed');

  const active = tasks.find(t => t.status === 'in_progress');
  const headerText = active?.activeForm || active?.subject || '';

  let html = '';
  if (headerText) {
    html += `<div class="task-list-header"><span class="task-header-icon">✱</span> <span class="task-header-text">${escHtml(headerText)}</span></div>`;
  }
  html += '<div class="task-list-items">';

  for (const t of pending) {
    const icon = t.status === 'in_progress' ? '◐' : '□';
    const cls = t.status === 'in_progress' ? 'in-progress' : 'pending';
    html += `<div class="task-item ${cls}"><span class="task-check">${icon}</span><span class="task-subject">${escHtml(t.subject)}</span></div>`;
  }

  const SHOW_MAX = 8;
  const visible = completed.slice(0, SHOW_MAX);
  const hidden = completed.length - SHOW_MAX;

  for (const t of visible) {
    html += `<div class="task-item completed"><span class="task-check">✓</span><span class="task-subject">${escHtml(t.subject)}</span></div>`;
  }

  if (hidden > 0) {
    html += `<div class="task-overflow">... +${hidden} completed</div>`;
  }

  html += '</div>';
  taskPanel.innerHTML = html;
  taskPanel.classList.add('visible');
  updateWorkspaceVisibility();
}

// --- Workspace visibility ---
function updateWorkspaceVisibility() {
  const hasActivity = activityEl.classList.contains('visible');
  const hasTasks = taskPanel.classList.contains('visible');
  workspace.classList.toggle('visible', hasActivity || hasTasks);
}

// --- Activity indicator ---
const spinnerFrames = ['◐', '◓', '◑', '◒'];
let spinnerIdx = 0;

function showActivity(text) {
  stopSpinner();
  activityEl.innerHTML = `<span class="activity-spinner">${spinnerFrames[0]}</span><span class="activity-text">${escHtml(text)}</span>`;
  activityEl.classList.add('visible');
  updateWorkspaceVisibility();

  spinnerIdx = 0;
  spinnerInterval = setInterval(() => {
    spinnerIdx = (spinnerIdx + 1) % spinnerFrames.length;
    const spinner = activityEl.querySelector('.activity-spinner');
    if (spinner) spinner.textContent = spinnerFrames[spinnerIdx];
  }, 200);
}

function hideActivity() {
  stopSpinner();
  activityEl.classList.remove('visible');
  activityEl.innerHTML = '';
  updateWorkspaceVisibility();
}

function stopSpinner() {
  if (spinnerInterval) {
    clearInterval(spinnerInterval);
    spinnerInterval = null;
  }
}

// --- Playback ---
function updateProgress() {
  const pct = messages.length > 0 ? (currentIndex / messages.length) * 100 : 0;
  progressFill.style.width = pct + '%';
  msgCounter.textContent = `${currentIndex}/${messages.length}`;
}

function updateStatus(state, text) {
  statusDot.className = 'status-dot ' + state;
  statusTextEl.textContent = text;
}

async function showMessage(index) {
  if (index >= messages.length) {
    playing = false;
    updatePlayButton();
    updateStatus('idle', 'Complete');
    hideActivity();
    return;
  }

  currentIndex = index;
  updateProgress();

  const msg = messages[index];

  if (msg.type === 'user') {
    updateStatus('active', 'Typing...');

    // Type in the input area (row 3)
    inputText.textContent = '';
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';
    inputText.appendChild(cursor);

    const chars = msg.text.split('');
    for (let i = 0; i < chars.length; i++) {
      if (!playing) break;
      inputText.insertBefore(document.createTextNode(chars[i]), cursor);
      if (i % 3 === 0) stream.scrollTop = stream.scrollHeight;
      await new Promise(r => setTimeout(r, 25 / speed));
    }
    cursor.remove();
    await new Promise(r => setTimeout(r, 300 / speed));

    // Move completed message to stream (row 1)
    inputText.textContent = '';
    const el = document.createElement('div');
    el.className = 'msg-user';
    el.innerHTML = `<span class="user-prompt">&#10095;</span><span class="user-text">${escHtml(msg.text)}</span>`;
    streamInner.appendChild(el);
    stream.scrollTop = stream.scrollHeight;

  } else if (msg.type === 'assistant') {
    let startTime = Date.now();
    showActivity('Responding...');

    for (const block of msg.content) {
      if (!playing) break;

      if (block.type === 'text' && block.text) {
        const el = document.createElement('div');
        el.className = 'assistant-block bullet-text';
        el.innerHTML = '<span class="bullet">&#9679;</span>' + md(block.text);
        streamInner.appendChild(el);
        stream.scrollTop = stream.scrollHeight;
        await new Promise(r => setTimeout(r, Math.max(80, 400 / speed)));

      } else if (block.type === 'tool_use') {
        // Task tools update workspace task list
        if (isTaskTool(block.name)) {
          handleTaskTool(block);
          stream.scrollTop = stream.scrollHeight;
          await new Promise(r => setTimeout(r, Math.max(50, 150 / speed)));
          continue;
        }

        showActivity(`${block.name}...`);

        const summary = getToolSummary(block);
        const command = getToolCommand(block);
        const commandLines = command.split('\n');
        const previewLine = commandLines[0].substring(0, 90);
        const extraLines = commandLines.length - 1;

        const toolEl = document.createElement('div');
        toolEl.className = 'tool-call';
        toolEl.innerHTML = `
          <div class="tool-call-header" onclick="this.parentElement.classList.toggle('open')">
            <span class="bullet">&#9679;</span>
            <span class="tool-call-name">${escHtml(block.name)}</span><span class="tool-call-paren">(</span><span class="tool-call-summary">${escHtml(summary)}</span><span class="tool-call-paren">)</span>
          </div>
          <div class="tool-call-body"><pre>${escHtml(redact(previewLine))}</pre></div>
          ${extraLines > 0 ? `<div class="tool-call-expand" onclick="this.parentElement.classList.toggle('open')">... +${extraLines} lines (click to expand)</div>` : ''}
        `;

        streamInner.appendChild(toolEl);
        stream.scrollTop = stream.scrollHeight;

        updateStatus('active', `${block.name}...`);
        await new Promise(r => setTimeout(r, Math.max(150, 600 / speed)));

        // Tool result
        if (block.result) {
          const r = block.result;
          const isError = r.is_error;
          const resultText = r.stdout || r.content || '';
          const stderrText = r.stderr || '';
          const displayText = (resultText + (stderrText ? '\n' + stderrText : '')).trim();

          if (displayText) {
            const redacted = redact(displayText);
            const resultLines = redacted.split('\n');
            const previewText = resultLines[0].substring(0, 90);
            const moreLines = resultLines.length - 1;

            const resultEl = document.createElement('div');
            resultEl.className = `tool-result ${isError ? 'error' : ''}`;
            resultEl.innerHTML = `
              <div class="tool-result-line" onclick="this.parentElement.classList.toggle('open')">
                <span class="tool-result-connector">&#9492;</span>
                <span class="tool-result-preview">${escHtml(previewText)}</span>
              </div>
              ${moreLines > 0 ? `<div class="tool-result-expand" onclick="this.parentElement.classList.toggle('open')">... +${moreLines} lines (click to expand)</div>` : ''}
              <div class="tool-result-body"><pre>${escHtml(redacted)}</pre></div>
            `;

            streamInner.appendChild(resultEl);
            stream.scrollTop = stream.scrollHeight;
            await new Promise(r => setTimeout(r, Math.max(80, 250 / speed)));
          }
        }
      }
    }

    hideActivity();

    // Status line
    let elapsed = ((Date.now() - startTime) / 1000).toFixed(0);
    const statusEl = document.createElement('div');
    statusEl.className = 'status-line';
    statusEl.innerHTML = `<span class="status-icon">&#10033;</span> Worked for ${elapsed}s`;
    streamInner.appendChild(statusEl);

    updateStatus('idle', 'Idle');
    await new Promise(r => setTimeout(r, Math.max(100, 400 / speed)));
  }

  currentIndex = index + 1;
  updateProgress();
}

function getRealTimeDelay(fromIndex, toIndex) {
  if (!realTimeMode) return 0;
  const from = messages[fromIndex];
  const to = messages[toIndex];
  if (!from || !to || !from.timestamp || !to.timestamp) return 0;
  const delta = new Date(to.timestamp) - new Date(from.timestamp);
  return Math.min(30000, Math.max(200, delta)) / speed;
}

async function playFrom(index) {
  for (let i = index; i < messages.length; i++) {
    if (!playing) break;
    if (realTimeMode && i > index) {
      const delay = getRealTimeDelay(i - 1, i);
      if (delay > 0) {
        updateStatus('active', `Next in ${(delay / 1000).toFixed(1)}s...`);
        await new Promise(r => setTimeout(r, delay));
        if (!playing) break;
      }
    }
    await showMessage(i);
  }
}

// --- Controls ---
function updatePlayButton() {
  const btn = document.getElementById('btn-play');
  btn.innerHTML = playing ? '&#10074;&#10074; Pause' : '&#9654; Play';
  btn.classList.toggle('active', playing);
}

document.getElementById('btn-play').onclick = () => {
  playing = !playing;
  updatePlayButton();
  if (playing) {
    updateStatus('active', 'Playing...');
    playFrom(currentIndex);
  } else {
    updateStatus('paused', 'Paused');
  }
};

document.getElementById('btn-step').onclick = () => {
  playing = true;
  showMessage(currentIndex).then(() => {
    playing = false;
    updatePlayButton();
    updateStatus('paused', 'Paused');
  });
};

document.getElementById('btn-slower').onclick = () => {
  if (speedIdx > 0) speedIdx--;
  speed = speeds[speedIdx];
  document.getElementById('speed-display').textContent = speed + 'x';
};

document.getElementById('btn-faster').onclick = () => {
  if (speedIdx < speeds.length - 1) speedIdx++;
  speed = speeds[speedIdx];
  document.getElementById('speed-display').textContent = speed + 'x';
};

document.getElementById('btn-realtime').onclick = () => {
  realTimeMode = !realTimeMode;
  document.getElementById('btn-realtime').classList.toggle('active', realTimeMode);
};

document.getElementById('new-file-btn').onclick = () => {
  document.getElementById('replay-screen').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
  streamInner.innerHTML = '';
  inputText.textContent = '';
  messages = [];
  currentIndex = 0;
  playing = false;
  taskState.clear();
  taskCounter = 0;
  taskPanel.innerHTML = '';
  taskPanel.classList.remove('visible');
  hideActivity();
  updatePlayButton();
};

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (document.getElementById('replay-screen').style.display === 'none') return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('btn-play').click(); }
  else if (e.code === 'ArrowRight') { e.preventDefault(); document.getElementById('btn-step').click(); }
  else if (e.code === 'ArrowUp') { e.preventDefault(); document.getElementById('btn-faster').click(); }
  else if (e.code === 'ArrowDown') { e.preventDefault(); document.getElementById('btn-slower').click(); }
  else if (e.code === 'KeyT') { e.preventDefault(); document.getElementById('btn-realtime').click(); }
});

// --- File upload ---
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const result = parseJSONL(e.target.result);
    messages = result.messages;
    currentIndex = 0;
    playing = false;

    document.getElementById('upload-screen').style.display = 'none';
    document.getElementById('replay-screen').style.display = 'flex';

    const info = result.sessionInfo;
    document.getElementById('status-model').textContent =
      messages.find(m => m.model)?.model || '';
    document.getElementById('status-branch').textContent =
      info.gitBranch ? info.gitBranch : '';

    updateProgress();
    updateStatus('idle', `${messages.length} messages loaded`);
  };
  reader.readAsText(file);
}

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.onclick = () => fileInput.click();
dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
dropZone.ondragleave = () => { dropZone.classList.remove('drag-over'); };
dropZone.ondrop = (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
};
fileInput.onchange = () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); };
</script>
</body>
